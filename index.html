<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fff4e0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="習慣">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
<title>習慣トラッカー</title>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="greeting" id="greeting">おはよう ☀️</div>
    <h1 class="title">習慣トラッカー</h1>
    <div class="date" id="dateLabel"></div>

    <div class="stats">
      <div class="stat-card streak">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="streakValue">0</div>
        <div class="stat-label">連続記録</div>
      </div>
      <button class="stat-card retire" id="retireCard" type="button">
        <div class="stat-icon">🌅</div>
        <div class="stat-value" id="retireValue">―</div>
        <div class="stat-label">退職まで</div>
      </button>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">今日の習慣 <span class="section-hint">— タップでチェック・長押しで編集</span></h2>
    <ul class="habit-list" id="habitList"></ul>
    <button class="add-btn" id="addBtn">＋ 習慣を追加</button>
  </section>

  <section class="section">
    <h2 class="section-title">この1週間</h2>
    <div class="history" id="history"></div>
  </section>

  <footer class="footer">
    <div class="encourage" id="encourage"></div>
  </footer>
</div>

<dialog id="retireDialog" class="dialog">
  <form method="dialog" id="retireForm">
    <h3>退職日を設定</h3>
    <p class="dialog-note">退職予定日（67歳の誕生日など）を入力してください。データはこの端末にのみ保存されます。</p>
    <label>退職日
      <input type="date" id="retireDate" required>
    </label>
    <div class="dialog-buttons">
      <button type="button" id="cancelRetire">キャンセル</button>
      <button type="submit" class="primary">保存</button>
    </div>
  </form>
</dialog>

<dialog id="addDialog" class="dialog">
  <form method="dialog" id="addForm">
    <h3>新しい習慣を追加</h3>
    <label>絵文字
      <input type="text" id="newEmoji" maxlength="4" placeholder="🌸" required>
    </label>
    <label>習慣の名前
      <input type="text" id="newName" maxlength="30" placeholder="例：読書" required>
    </label>
    <div class="dialog-buttons">
      <button type="button" id="cancelAdd">キャンセル</button>
      <button type="submit" class="primary">追加する</button>
    </div>
  </form>
</dialog>

<dialog id="editDialog" class="dialog">
  <form method="dialog" id="editForm">
    <h3>習慣を編集</h3>
    <label>絵文字
      <input type="text" id="editEmoji" maxlength="4" required>
    </label>
    <label>習慣の名前
      <input type="text" id="editName" maxlength="30" required>
    </label>
    <div class="dialog-buttons">
      <button type="button" id="deleteHabit" class="danger">削除</button>
      <button type="button" id="cancelEdit">キャンセル</button>
      <button type="submit" class="primary">保存</button>
    </div>
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
